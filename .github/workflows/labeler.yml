# ===============================
# TEMPLATE COMPATÍVEL COM GITHUB ACTIONS
# Documentação: https://docs.github.com/actions
# ===============================
name: Label PRs

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  label:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.pull_request.head.repo.fork == false
    steps:
      - name: Label PR
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          dot: true

      - name: Add size labels
        uses: actions/github-script@v7
        with:
          script: |
            const { pull_request } = context.payload;
            const additions = pull_request.additions || 0;
            const deletions = pull_request.deletions || 0;
            const changes = additions + deletions;

            const labels = [];

            // Size labels
            if (changes < 50) {
              labels.push('size/xs');
            } else if (changes < 100) {
              labels.push('size/s');
            } else if (changes < 300) {
              labels.push('size/m');
            } else if (changes < 700) {
              labels.push('size/l');
            } else if (changes < 1500) {
              labels.push('size/xl');
            } else {
              labels.push('size/xxl');
            }

            // Add all labels
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pull_request.number,
                labels: labels
              });
            }
